version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:15
    container_name: mental_health_db
    environment:
      POSTGRES_DB: mental_health_db
      POSTGRES_USER: mental_health_user
      POSTGRES_PASSWORD: mental_health_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mental_health_network

  # Redis for caching and task queue
  redis:
    image: redis:7-alpine
    container_name: mental_health_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mental_health_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mental_health_backend
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://mental_health_user:mental_health_password@postgres:5432/mental_health_db
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    networks:
      - mental_health_network
    volumes:
      - ./backend:/app

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mental_health_frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - mental_health_network
    volumes:
      - ./frontend:/app
      - /app/node_modules

networks:
  mental_health_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: